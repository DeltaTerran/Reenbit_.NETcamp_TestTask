@if (!isNameSet) {
  <div class="name-screen">
    <div class="name-card">
      <h2>Welcome to Chat</h2>
      <p>Enter your name to continue</p>

      <input
        type="text"
        [(ngModel)]="user"
        placeholder="Your name"
        (keydown.enter)="confirmUser()"
      />

      <button (click)="confirmUser()">Continue</button>
    </div>
  </div>
} @else {
  <div class="chat-container">

    <div class="chat-header">
      <span class="username">{{ user }}</span>
      <button class="change-user-btn" (click)="changeUser()">Change name</button>
    </div>

    <div class="chat-messages">
      @for (msg of chatService.messages(); track $index) {
        <div
          class="message"
          [class.own]="msg.user === user"
          [class.other]="msg.user !== user">

          <div class="bubble">
            <div class="text">{{ msg.text }}</div>
            <div class="meta">
              <span class="user">{{ msg.user }}</span>
              @if (msg.sentiment) {
                <span class="sentiment">• {{ msg.sentiment }}</span>
              }
            </div>
          </div>
        </div>
      }
    </div>

    <div class="chat-input">
      <input
        type="text"
        placeholder="Type a message..."
        [(ngModel)]="message"
        (keydown.enter)="send()"
      />

      <button (click)="send()">➤</button>
    </div>

  </div>
}
